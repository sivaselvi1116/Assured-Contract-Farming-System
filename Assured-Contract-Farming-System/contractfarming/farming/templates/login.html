<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:#e8f5e9;
        }

        .login-box{
            width:350px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px gray;
            text-align:center;
        }

        h1{
            color:green;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
            border-radius:8px;
            border:1px solid gray;
        }

        button{
            width:95%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
        }
    </style>

</head>

<body>

<div class="login-box">

<h1>Assured Contract Farming System</h1>

<form action="/home/" method="get">

<input type="text" placeholder="Full Name" required><br>

<input type="text" placeholder="Mobile Number" required><br>

<input type="email" placeholder="Email ID" required><br>

<input type="password" placeholder="Password" required><br>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
